<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Splaye</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head>
<body>
<div id="app">
<div id="searchPage" class="page">
<h1>Splaye</h1>
<input id="search" placeholder="Search artist...">
<div id="artistList"></div>
</div>

<div id="songsPage" class="page hidden">
<button onclick="showArtists()">← Back</button>
<h2 id="artistTitle"></h2>
<div id="songList"></div>
</div>

<div id="playerPage" class="page hidden">
<div id="bg"></div>
<div class="player">
<img id="cover">
<h2 id="title"></h2>
<p id="artist"></p>
<input type="range" id="progress" value="0">
<div>
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextSong()">⏭</button>
</div>
</div>
</div>
</div>
<script src="app.js"></script>
</body></html>
